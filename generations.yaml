generations:
  - name: "First Generation"
    start_year: 2017
    end_year: 2021
    description: "The first-generation Chevrolet Bolt EV represented a milestone for General Motors as the company's first mass-produced, purpose-built electric vehicle with a focus on affordability and practical range. Featuring a tall, compact hatchback design optimized for interior space within a small footprint, the Bolt EV offered seating for five and surprisingly generous cargo capacity for its external dimensions. Powered by a single electric motor producing 200 horsepower and 266 lb-ft of torque driving the front wheels, the Bolt delivered spirited performance with 0-60 mph acceleration in approximately 6.5 seconds. The 60 kWh lithium-ion battery pack provided an EPA-rated range of 238 miles (later improved to 259 miles with software updates)—unprecedented at its price point when introduced and eliminating much of the range anxiety associated with earlier affordable EVs. The interior featured a digital instrument cluster and a 10.2-inch central touchscreen, with materials that prioritized durability over luxury. Distinctive features included an electronic precision shift system using a shift-by-wire design, one-pedal driving capability through aggressive regenerative braking, and a surround-view camera system unusual for its segment. DC fast charging capability was available, though limited to a maximum of 55 kW. Despite winning numerous accolades including Motor Trend Car of the Year and North American Car of the Year, the Bolt EV faced challenges in the market including a major battery recall affecting all models due to fire risk, requiring replacement of battery modules. The first generation used the GM BEV2 platform and was produced from October 2016 through August 2021. Nevertheless, the first-generation Bolt EV established GM's capabilities in electric vehicle development and provided a practical, affordable option for mainstream consumers ready to transition to electric mobility."

  - name: "First Generation (2022-2023 Facelift)"
    start_year: 2022
    end_year: 2023
    description: "For the 2022 model year, the Chevrolet Bolt EV received front and rear styling revisions while maintaining the GM BEV2 platform. The exterior received a more modern, mainstream design with a closed-off front fascia, new LED headlights with new faux-grille and trim. The tail lights and tailgate hatch also received updates. The interior saw significant changes with the shifter replaced with gear shifter buttons and seats upgraded with higher quality materials and more padding. A completely redesigned dashboard featured a larger info screen, with the interior receiving updated electronics and new software. Level 2 charging was increased to allow charging at 48 amps, up from 32 amps. The powertrain maintained the single-motor front-wheel drive configuration producing 200 horsepower and 266 lb-ft of torque, paired with a 66 kWh battery providing an EPA-rated range of 259 miles. Charging capabilities included up to 11 kW Level 2 AC charging and 55 kW DC fast charging. New technology features included wireless Apple CarPlay and Android Auto, HD surround vision camera, and enhanced driver assistance capabilities. Chevrolet addressed previous battery fire issues with new cell chemistry and manufacturing processes, backing this with an 8-year/100,000-mile battery warranty. Production of this first-generation variant continued until December 2023, when GM ended Bolt production in favor of new generation models based on the Ultium platform."
